name: linux

on:
  push:
    branches:
      - '*'
    tags-ignore:
      - '*'
  pull_request:

permissions:
  contents: read

jobs:
  perl:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        perl-version:
          - '5.14'
          - '5.26'
          - '5.30'
          - '5.32'
          - '5.34'
          - '5.36'
          - '5.38'
          - '5.40'
          - 'latest'

    steps:
      - uses: actions/checkout@v6

      - name: Set up Perl
        uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: ${{ matrix.perl-version }}

      - name: perl -V
        run: perl -V

      - name: Run tests
        run: |
          perl Makefile.PL
          perl -MConfig -e 'system($Config::Config{make}, "disttest") == 0 or die "disttest failed\n"'
